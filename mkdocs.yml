site_name: Documentation
repo_url: https://github.com/placeholder/placeholder
repo_name: placeholder/placeholder

theme:
  name: material
  logo: logo.svg
  favicon: logo.svg
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

plugins:
  - search
  - awesome-pages

extra:
  scope: /
  portal:
    name: Documentation Portal
    url: https://drewdz3.github.io/

extra_css:
  - styles.css