name: ex_bot
description: "AI Fitness Coach"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^9.1.1
  
  # Code Generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  
  # HTTP Client
  dio: ^5.7.0
  
  # Routing
  go_router: ^16.2.4
  
  # Dependency Injection
  injectable: ^2.5.0
  get_it: ^8.0.2
  
  # Functional Programming
  either_dart: ^1.0.0
  
  # Environment Variables
  flutter_dotenv: ^6.0.0
  
  # Authentication
  flutter_appauth: ^11.0.0
  
  # Vector Graphics
  flutter_svg: ^2.0.14
  
  # Secure Storage
  flutter_secure_storage: ^9.2.2

  universal_platform: ^1.1.0

  intl: ^0.20.2
  jwt_decode: ^0.3.1
  
  # Database
  realm: ^3.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.7
  freezed: 3.0.6
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  
  # Testing
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - .android.env
    - .apple.env
    - .default.env
    - assets/msal_config.json
