name: Publish docs to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: pip install mkdocs-material mkdocs-awesome-pages-plugin

      - name: Copy root README into docs
        run: cp README.md docs/index.md  
        
      - name: Configure MkDocs site metadata
        run: |
          REPO_FULL_NAME="${{ github.repository }}"
          REPO_NAME="${{ github.event.repository.name }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/"

          SITE_NAME=$(echo "$REPO_NAME" | sed 's/[-_]/ /g' | sed 's/\b\(.\)/\u\1/g')
          
          sed -i "s|^site_name:.*|site_name: $SITE_NAME|" mkdocs.yml
          
          if grep -q "^repo_url:" mkdocs.yml; then
            sed -i "s|^repo_url:.*|repo_url: $REPO_URL|" mkdocs.yml
          else
            printf "\nrepo_url: %s\n" "$REPO_URL" >> mkdocs.yml
          fi
          
          if grep -q "^repo_name:" mkdocs.yml; then
            sed -i "s|^repo_name:.*|repo_name: $REPO_FULL_NAME|" mkdocs.yml
          else
            printf "repo_name: %s\n" "$REPO_FULL_NAME" >> mkdocs.yml
          fi    
          
          cat > docs/docs-site.json <<EOF
{
  "name": "$SITE_NAME",
  "slug": "$REPO_NAME",
  "repo": "$REPO_FULL_NAME",
  "repo_url": "$REPO_URL",
  "url": "$PAGES_URL",
  "description": "",
  "type": "project"
}
          EOF


      - name: Build HTML site
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4