name: Publish docs to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: pip install mkdocs-material mkdocs-awesome-pages-plugin

      - name: Copy root README into docs
        run: cp README.md docs/index.md  
        
      - name: Set site name from repository name
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          SITE_NAME=$(echo "$REPO_NAME" | sed 's/[-_]/ /g' | sed 's/\b\(.\)/\u\1/g')
          echo "Using site name: $SITE_NAME"
          sed -i "s/^site_name:.*/site_name: $SITE_NAME/" mkdocs.yml
    
      - name: Build HTML site
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4